<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedidos y Contacto | Avícola San Fresco</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --negro-puro: #000000;
            --negro-card: #0a0a0a;
            --amarillo: #ffcc00;
            --blanco: #ffffff;
            --gris-borde: #222222;
            --verde-whatsapp: #25D366;
            --rojo-delivery: #d32f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background-color: var(--negro-puro); color: var(--blanco); line-height: 1.6; }

        /* --- NAVEGACIÓN UNIFICADA --- */
        nav { 
            background-color: rgba(0, 0, 0, 0.95); 
            padding: 20px 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 2px solid var(--amarillo); 
            position: sticky; 
            top: 0; 
            z-index: 1000; 
        }
        .logo { font-weight: 900; font-size: 1.8rem; color: var(--amarillo); text-decoration: none; text-transform: uppercase; }
        .logo span { color: var(--blanco); }
        
        /* Enlaces del menú */
        .menu-links a { text-decoration: none; color: var(--blanco); font-weight: 700; margin-left: 20px; font-size: 0.9rem; transition: 0.3s; }
        .menu-links a:hover { color: var(--amarillo); }
        .menu-links a.active { color: var(--amarillo); border-bottom: 2px solid var(--amarillo); padding-bottom: 5px; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* --- SECCIÓN CONTACTO Y MAPA --- */
        .grid-contacto { display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px; margin-bottom: 40px; }
        .mapa-frame { border-radius: 20px; overflow: hidden; height: 400px; border: 2px solid var(--amarillo); }
        iframe { width: 100%; height: 100%; border: 0; filter: invert(90%) hue-rotate(180deg); }

        .info-card { background: var(--negro-card); padding: 30px; border-radius: 20px; border: 1px solid var(--gris-borde); display: flex; flex-direction: column; justify-content: center; }
        .info-card h2 { color: var(--amarillo); margin-bottom: 20px; font-weight: 900; text-transform: uppercase; }
        .info-card p { margin-bottom: 15px; font-size: 1.1rem; }
        .btn-tel { color: var(--amarillo); text-decoration: none; font-weight: 900; font-size: 1.4rem; }

        /* --- SECCIÓN QUEJAS / SUGERENCIAS --- */
        .quejas-section { 
            background: var(--negro-card); 
            padding: 40px; 
            border-radius: 20px; 
            border: 1px solid var(--gris-borde); 
            max-width: 800px; 
            margin: 40px auto;
        }
        .quejas-section h2 { color: var(--amarillo); text-align: center; margin-bottom: 30px; font-weight: 900; text-transform: uppercase; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: var(--amarillo); margin-bottom: 8px; font-weight: 700; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; padding: 15px; background: #111; border: 1px solid var(--gris-borde); 
            color: white; border-radius: 10px; font-family: 'Outfit'; font-size: 1rem;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--amarillo); outline: none; }

        .btn-enviar { 
            background: var(--amarillo); color: black; width: 100%; padding: 18px; 
            border: none; border-radius: 10px; font-weight: 900; cursor: pointer; 
            text-transform: uppercase; font-size: 1.1rem; transition: 0.3s;
        }
        .btn-enviar:hover { transform: scale(1.02); background: #e6b800; }

        footer { text-align: center; padding: 40px; border-top: 1px solid var(--gris-borde); color: var(--amarillo); font-weight: 700; margin-top: 40px; }

        @media (max-width: 800px) { 
            .grid-contacto { grid-template-columns: 1fr; } 
            nav { flex-direction: column; gap: 15px; padding: 15px; } 
            .menu-links { display: flex; flex-wrap: wrap; justify-content: center; }
            .menu-links a { margin: 5px 10px; }
        }
    </style>
</head>
<body>

<nav>
    <a href="index.html" class="logo">SAN <span>FRESCO</span></a>
    <div class="menu-links">
        <a href="index.html">INICIO</a>
        <a href="nosotros.html">NOSOTROS</a>
        <a href="catalogo.html">CATÁLOGO</a>
        <a href="pedidos.html" class="active">PEDIDOS</a>
    </div>
</nav>

<div class="container">
    <div class="grid-contacto">
        <div class="mapa-frame">
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3759.431289123456!2d-99.3000000!3d19.5500000!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTnCsDMzJzAwLjAiTiA5OcKwMTgnMDAuMCJX!5e0!3m2!1ses-419!2smx!4v1700000000000!5m2!1ses-419!2smx" 
                allowfullscreen="" 
                loading="lazy">
            </iframe>
        </div>

        <div class="info-card">
            <h2>UBICACIÓN</h2>
            <p><strong>Dirección:</strong> Av. México 42, Mexico 86, 52915 Cdad. López Mateos, Méx.</p>
            <p><strong>Atención Directa:</strong> <br> <a href="tel:5588368057" class="btn-tel">📞 55 8836 8057</a></p>
            <p><strong>Horarios:</strong><br> Lunes a Sábado: 7:00 AM - 5:00 PM</p>
        </div>
    </div>

    <div class="quejas-section">
        <h2>Quejas o Sugerencias</h2>
        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" id="nombre_q" placeholder="Escribe tu nombre">
        </div>
        <div class="form-group">
            <label>¿Qué deseas enviarnos?</label>
            <select id="tipo_q">
                <option value="Sugerencia">Sugerencia</option>
                <option value="Queja">Queja</option>
                <option value="Felicitación">Felicitación</option>
            </select>
        </div>
        <div class="form-group">
            <label>Tu Comentario</label>
            <textarea id="mensaje_q" rows="4" placeholder="Cuéntanos más..."></textarea>
        </div>
        <button class="btn-enviar" onclick="enviarFormulario()">Enviar a WhatsApp</button>
    </div>
</div>

<footer>
    <p>© 2026 AVÍCOLA SAN FRESCO | CALIDAD Y FRESCURA ELITE</p>
</footer>

<script>
    function enviarFormulario() {
        const nombre = document.getElementById('nombre_q').value;
        const tipo = document.getElementById('tipo_q').value;
        const mensaje = document.getElementById('mensaje_q').value;
        const numero = "5588368057";

        if(!nombre || !mensaje) {
            alert("Por favor, llena todos los campos.");
            return;
        }

        // Crea el mensaje para WhatsApp
        const texto = `📢 *NUEVA ATENCIÓN AL CLIENTE*%0A%0A*Tipo:* ${tipo}%0A*Nombre:* ${nombre}%0A*Comentario:* ${mensaje}`;
        const win = window.open(`https://wa.me/${numero}?text=${texto}`, '_blank');
    }
</script>

</body>
</html>
